<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>QR코드 인쇄 | 노고 아카데미</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 280px;
      border: 3px solid #111;
      border-radius: 16px;
      overflow: hidden;
      text-align: center;
    }

    .card-header {
      background: #111;
      padding: 18px 16px 14px;
    }

    .stripe {
      height: 5px;
      background: repeating-linear-gradient(
        90deg,
        #F5C518 0px, #F5C518 16px,
        #111 16px, #111 24px
      );
      margin-bottom: 14px;
    }

    .emoji { font-size: 32px; display: block; margin-bottom: 8px; }

    .title {
      font-size: 16px;
      font-weight: 800;
      color: #F5C518;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }

    .qr-area {
      background: #fff;
      padding: 24px 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #qrcode canvas,
    #qrcode img {
      border-radius: 8px;
    }

    .scan-text {
      font-size: 13px;
      font-weight: 700;
      color: #111;
    }

    .scan-sub {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .card-footer {
      background: #111;
      padding: 12px;
    }

    .brand {
      font-size: 10px;
      color: #555;
      letter-spacing: 1.5px;
    }

    /* 인쇄 설정 */
    @media print {
      body {
        min-height: unset;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .no-print { display: none; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="stripe"></div>
    <span class="emoji">🚧</span>
    <div class="title">포크레인 RC<br>조종 가이드</div>
    <div class="subtitle">QR코드를 스캔해보세요</div>
  </div>

  <div class="qr-area">
    <div id="qrcode"></div>
    <div>
      <div class="scan-text">📱 QR코드 스캔</div>
      <div class="scan-sub">조종 방법을 확인할 수 있어요</div>
    </div>
  </div>

  <div class="card-footer">
    <div class="brand">노고 아카데미 | NOGO ACADEMY</div>
  </div>
</div>

<!-- 인쇄 버튼 (인쇄 시 자동으로 숨겨짐) -->
<div class="no-print" style="position:fixed; bottom:24px; right:24px;">
  <button onclick="window.print()"
    style="background:#F5C518; color:#111; border:none; padding:12px 24px;
           border-radius:8px; font-size:14px; font-weight:800; cursor:pointer;">
    🖨 인쇄하기
  </button>
</div>

<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://nogoacademy.github.io",
    width: 200,
    height: 200,
    colorDark: "#111111",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
